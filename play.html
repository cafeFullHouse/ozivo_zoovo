<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おぢさんもんじゃ</title>
    <style>
        #recordingAudios audio{
            width: 66.6666%;
            max-width: none; 
            margin: 10px 0;
            display: block;
            transform-origin: center;
        }

        #recordBtn{
            font-weight: bold;
            font-size: 1.2em;
            text-decoration: none;
            background: #ec84a7;
            color: white;
            margin: 0px 10px;
            padding: 7px 15px;
            border-radius: 20px;
        }

        #stopBtn{
            font-weight: bold;
            font-size: 1.2em;
            text-decoration: none;
            background: #84bdec;
            color: white;
            margin: 0px 10px;
            padding: 7px 15px;
            border-radius: 20px;
        }

        #displayImg{
            width: 80%;
            margin: auto;
            pointer-events: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -moz-touch-collout: none;
            -moz-user-select: none;
            display: block;
        }

        #recBtn,#stopBtn,#answerBtn,#playingAudio{
            width: 30%;
            margin: auto;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -moz-touch-collout: none;
            -moz-user-select: none;
            outline: none;
            background: transparent !important;
            display: block;
        }

        #playingAudio{
            padding: 50px 0px;
        }

        #nextBtn{
            width: 30%;
            text-align: right;
            margin-left: auto; 
            margin-right: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -moz-touch-collout: none;
            -moz-user-select: none;
            outline: none;
            background: transparent !important;
            display: block;
        }

        button:disabled {
            filter: saturate(0.1);
            cursor: not-allowed;
        }

        #gameStartImg{
            width: 100%;
        }

    </style>
</head>
<body>
    <div id="recordingPage">
        <div id="counter">1/12</div>

        <img id="displayImg" src="" alt="">
        
        <img id="recBtn" src="recBtnBefore.png" alt="recBtn" onclick="recBtnClick()">
        <img id="stopBtn" src="stopBtnBefore.png" alt="stopBtn" onclick="stopBtnClick()">
        <img id="returnBtn" src="return.png" alt="returnBtn" onclick="returnBtnClick()">

        <audio id="recordingAudio" src="" controls></audio>

        <button id="debug">SKIP</button>
    </div> 

    <div id="transitionPage" style="display: none;">
        <h1>右隣の人にスマホを渡してね</h1>
        
        <img id="returnBtn" src="return.png" alt="returnBtn" onclick="returnBeforeRecording()">
        <img id="transitionNextBtn" src="nextBtn.png" alt="nextBtn" onclick="goNextRecording()">
    </div>

    <div id="gameStartUI" style="display: none;">
        <img id="gameStartImg" src="GAME_START.png" alt="GAME START!">
    </div>

    <div id="answerPage" style="display: none;">
        <div id="answerCounter">1/24</div>

        <img id="displayImg" src="img0.png" alt="answerImg">

        <audio id="playingAudio" src="" controls></audio>

        <img id="answerBtn" src="answerBtn.png" alt="answerBtnImg" onclick="answerBtnClick()">
        <img id="answerNextBtn" src="nextBtn.png" alt="nextBtnImg" onclick="nextBtnClick()" style="display: none;">
    </div>

    <script src="recordAndPlay.js"></script>
</body>
</html>
